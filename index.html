<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Demo Player</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background-color: #f8f9fa; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #upload-screen { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    .upload-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
    
    #player-screen { display: none; flex-direction: column; height: 100vh; background-color: #1e1e1e; color: white; position: relative;}
    
    .toolbar-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 70px; z-index: 100; }
    .toolbar { padding: 15px 30px; background: #2d2d2d; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.6); transform: translateY(-100%); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; position: relative; }
    .toolbar-wrapper:hover .toolbar { transform: translateY(0); opacity: 1; }
    
    .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #ff9800; width: 0%; transition: width 0.4s ease; }

    .demo-header { display: flex; align-items: center; gap: 20px; }
    .demo-title-display { font-size: 18px; font-weight: bold; color: #fff; margin: 0; }
    .step-counter { font-size: 14px; color: #aaa; margin: 0; }

    .sidebar-hover-area { position: absolute; right: 0; top: 70px; bottom: 0; width: 40px; z-index: 90; }
    .sidebar-wrapper { position: absolute; right: 0; top: 0; bottom: 0; width: 150px; transform: translateX(100%); transition: transform 0.3s ease; box-shadow: -4px 0 15px rgba(0,0,0,0.5); }
    .sidebar-hover-area:hover .sidebar-wrapper, .sidebar-wrapper:hover { transform: translateX(0); }
    .sidebar { width: 100%; height: 100%; background: #262626; overflow-y: auto; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
    
    .thumbnail { width: 100%; margin-bottom: 15px; cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; position: relative; background: #000; }
    .thumbnail img { width: 100%; display: block; opacity: 0.6; transition: opacity 0.2s; }
    .thumbnail:hover img { opacity: 1; }
    .thumbnail.active { border-color: #ff9800; }
    .thumbnail.active img { opacity: 1; }
    .thumb-label { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fff; font-size: 11px; padding: 4px; box-sizing: border-box; text-align: center; font-weight: bold;}

    .player-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: auto; user-select: none; }
    .player-container { position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }
    #screenshot { display: block; max-width: 100%; max-height: 80vh; pointer-events: none; -webkit-user-drag: none; }
    
    #annotations-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
    #connector-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .hotspot { position: absolute; background-color: rgba(255, 152, 0, 0.4); border: 2px solid #ff9800; border-radius: 50%; cursor: pointer; pointer-events: auto; }
    .hotspot.trigger { animation: pulse 1.5s infinite; }
    .hotspot:hover { background-color: rgba(255, 152, 0, 0.8); }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 152, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); } }
    
    .slide-arrow-wrapper { position: absolute; left: 50%; top: 50%; width: 0; height: 0; pointer-events: none; }
    .slide-arrow { position: absolute; font-weight: bold; background: linear-gradient(to right, rgba(255, 152, 0, 0) 0%, rgba(255, 152, 0, 1) 40%, rgba(255, 152, 0, 1) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: slideBounce 1s infinite alternate; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.4)); }
    @keyframes slideBounce { 0% { transform: translateX(0); } 100% { transform: translateX(15px); } }
    
    .tooltip { position: absolute; background: white; color: #333; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transform: translateX(-50%); pointer-events: auto; width: fit-content; height: auto !important; transition: opacity 0.2s; display: flex; flex-direction: column; cursor: grab;}
    .tooltip:active { cursor: grabbing; }
    .tooltip::before { content: ''; display: block; width: 35px; height: 4px; background: #ddd; border-radius: 2px; margin: -5px auto 10px auto; flex-shrink: 0; }
    
    .tooltip-title { font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; flex-shrink: 0; cursor: text; user-select: text;}
    .tooltip-content { line-height: 1.5; font-family: sans-serif; flex-grow: 1; overflow-y: auto; cursor: text; user-select: text;}
    .tooltip-content ul { margin: 5px 0; padding-left: 20px; }

    .nav-btn { padding: 0; width: 36px; height: 36px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 50%; font-weight: bold; font-size: 18px; margin-left: 8px; display: inline-flex; align-items: center; justify-content: center;}
    .nav-btn:disabled { background: #555; cursor: not-allowed; color: #888; }
  </style>
</head>
<body>
  <div id="upload-screen">
    <div class="upload-card">
      <h1>Demo Player</h1>
      <input type="file" id="jsonUpload" accept=".json">
    </div>
  </div>

  <div id="player-screen">
    <div class="toolbar-wrapper">
      <div class="toolbar">
        <div class="demo-header">
          <h2 id="demoTitleDisplay" class="demo-title-display">Loading...</h2>
          <span id="stepCounter" class="step-counter">Step 1</span>
        </div>
        <div>
          <button class="nav-btn" id="prevBtn" title="Previous Step (Right Click)">&lt;</button>
          <button class="nav-btn" id="nextBtn" title="Next Step">&gt;</button>
        </div>
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    
    <div class="sidebar-hover-area">
      <div class="sidebar-wrapper">
        <div class="sidebar" id="sidebar"></div>
      </div>
    </div>

    <div class="player-wrapper">
      <div class="player-container" id="playerContainer">
        <img id="screenshot" src="" alt="Demo Step">
        <div id="annotations-container"></div>
      </div>
    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
